version: '3.8'

services:
  # 1. Local Database with pgvector extension
  db:
    image: pgvector/pgvector:16-pgdg
    container_name: fitnaija-dev-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitnaija
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Local Redis Broker & Cache
  redis:
    image: redis:7-alpine
    container_name: fitnaija-dev-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
