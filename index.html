          `Exceptional! Moving consistently prevents desk stiffness. Maintain high hydration levels in this Abuja heat.`,
          `Superb accountability shown with this ${activity} session. Abuja stays strong one professional at a time!`
        ];
        const randomTip = tips[Math.floor(Math.random() * tips.length)];
        setAiEncouragement(randomTip);
      };

      // Handle Workout submission
      const handleAddWorkout = (e) => {
        e.preventDefault();
        if (!duration) return;

        const newLog = {
          id: 'w_' + Date.now(),
          type: activityType,
          duration: parseInt(duration),
          notes: notes || `Completed intense ${activityType} routine!`,
          date: new Date().toISOString().split('T')[0],
          proof: imagePreview
        };

        setWorkoutLogs([newLog, ...workoutLogs]);
        
        // Add workout directly to Community Feed automatically for accountability
        const newFeedItem = {
          id: 'f_' + Date.now(),
          userName: 'You (Chidi)',
          userAvatar: userProfile.avatar,
          action: 'logged a workout',
          detail: `Logged a ${newLog.duration} mins ${newLog.type} session. Notes: "${newLog.notes}"`,
          time: 'Just now',
          cheers: 0,
          cheered: false,
          challenge: 'Personal Streak',
          type: 'workout'
        };
        setFeed([newFeedItem, ...feed]);

        // Generate AI Coach reaction
        triggerAiEncouragement(activityType, duration);

        // Reset fields & switch tabs to Dashboard or Feed
        setDuration('');
        setNotes('');
        setImagePreview(null);
        showToast(`Logged successfully! AI Accountability Coach approved this!`);
        setCurrentTab('dashboard');
      };

      // Handle Join/Leave Challenge
      const handleToggleJoinChallenge = (challengeId) => {
        setChallenges(challenges.map(c => {
          if (c.id === challengeId) {
            const isJoining = !c.joined;
            showToast(isJoining ? `Successfully joined "${c.title}"!` : `Left "${c.title}"`);
            
            // Add milestone event to feed if joining
            if (isJoining) {
              const newFeedItem = {
                id: 'f_join_' + Date.now(),
                userName: 'You (Chidi)',
                userAvatar: userProfile.avatar,
                action: 'joined a new challenge',
                detail: `Stepped up to conquer the ${c.title}! Watch the space.`,
                time: 'Just now',
                cheers: 0,
                cheered: false,
                challenge: c.title,
                type: 'milestone'
              };
              setFeed([newFeedItem, ...feed]);
            }
            return { 
              ...c, 
              joined: isJoining,
              participantsCount: isJoining ? c.participantsCount + 1 : c.participantsCount - 1
            };
          }
          return c;
        }));
      };

      // Handle Cheers/Like
      const handleToggleCheer = (feedId) => {
        setFeed(feed.map(item => {
          if (item.id === feedId) {
            return {
              ...item,
              cheered: !item.cheered,
              cheers: item.cheered ? item.cheers - 1 : item.cheers + 1
            };
          }
          return item;
        }));
      };

      // Create interactive community post
      const handleCreatePost = (e) => {
        e.preventDefault();
        if (!newPostText.trim()) return;

        const newPost = {
          id: 'f_post_' + Date.now(),
          userName: 'You (Chidi)',
          userAvatar: userProfile.avatar,
          action: 'shared updates',
          detail: `“${newPostText}”`,
          time: 'Just now',

          cheered: false,
          challenge: 'General Chat',

        };

        setNewPostText('');
        showToast('Accountability post shared with the community!');
      };

          reader.onloadend = () => {
            setImagePreview(reader.result);
          };
          reader.readAsDataURL(file);
        }
      };

        const totalWorkouts = workoutLogs.length;
        const totalDuration = workoutLogs.reduce((acc, curr) => acc + curr.duration, 0);

                      </p>
                      
                      <div className="bg-bgSoft p-3.5 rounded-lg border border-borderLight inline-block">
                        <span className="text-[10px] uppercase font-extrabold tracking-wider text-textMuted block mb-0.5">Title Rank</span>
                        <span className="text-brand font-bold text-sm">{userProfile.level}</span>
                      </div>
                    </div>

                    <div className="bg-white border border-borderLight p-5 rounded-xl shadow-xs">
                      <h4 className="font-bold text-textDark font-serif text-sm mb-3">Accountability Quick Data</h4>
                      <div className="space-y-2">
                        <div className="flex justify-between text-xs">
                          <span className="text-textMuted font-medium">Active XP Points</span>
                          <span className="font-bold text-textDark">{userProfile.xp} XP</span>
                        </div>
                        <div className="flex justify-between text-xs">
                          <span className="text-textMuted font-medium">Platform Log count</span>
                          <span className="font-bold text-textDark">{stats.totalWorkouts} logged</span>
                        </div>
                        <div className="flex justify-between text-xs">
                          <span className="text-textMuted font-medium">Completed Milestones</span>
                          <span className="font-bold text-textDark">{userProfile.completedCount} challenges</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Right Column: Completed Challenges & Detailed Logs */}
                  <div className="md:col-span-2 space-y-6">
                    
                    {/* Logged History List */}
                    <div className="bg-white border border-borderLight p-6 rounded-xl shadow-xs">
                      <h3 className="text-lg font-bold font-serif text-textDark mb-4">Full Logged History</h3>
                      
                      {workoutLogs.length === 0 ? (
                        <p className="text-xs text-textMuted italic">No history logged yet.</p>
                      ) : (
                        <div className="space-y-4">
                          {workoutLogs.map((log) => (
                            <div key={log.id} className="p-4 bg-bgSoft rounded-lg border border-borderLight flex justify-between items-start">
                              <div>
                                <div className="flex items-center gap-2 mb-1">
                                  <span className="bg-brand/10 text-brand text-[10px] font-extrabold px-2.5 py-0.5 rounded-md uppercase tracking-wider">
                                    {log.type}
                                  </span>
                                  <span className="text-xs text-textDark font-bold">{log.duration} minutes logged</span>
                                </div>
                                <p className="text-xs text-textDark mt-1.5 font-medium">&ldquo;{log.notes}&rdquo;</p>
                                <span className="text-[10px] text-textMuted mt-1 block">Uploaded: {log.date}</span>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>

                    {/* Completed Arena Challenges */}
                    <div className="bg-white border border-borderLight p-6 rounded-xl shadow-xs">
                      <h3 className="text-lg font-bold font-serif text-textDark mb-4">Completed Accountability Runs ({userProfile.completedCount})</h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div className="p-4 bg-bgSoft border border-borderLight rounded-lg">
                          <span className="text-brand text-xs font-bold block mb-1">May 2026</span>
                          <h4 className="font-bold text-sm text-textDark">Central Area Fast Walk 10K</h4>
                          <span className="text-[10px] text-textMuted font-medium block">Achieved 400 XP</span>
                        </div>
                        <div className="p-4 bg-bgSoft border border-borderLight rounded-lg">
                          <span className="text-brand text-xs font-bold block mb-1">April 2026</span>
                          <h4 className="font-bold text-sm text-textDark">Jabi Lake Sprint Marathon</h4>
                          <span className="text-[10px] text-textMuted font-medium block">Achieved 500 XP</span>
                        </div>
                      </div>
                    </div>

                  </div>

                </div>
              )}

            </div>

          </main>

          {/* FOOTER */}
          <footer className="bg-white border-t border-borderLight py-8 mt-16">
            <div className="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
              <div>
                <span className="font-serif font-bold text-lg text-textDark block">FitNaija</span>
                <span className="text-xs text-textMuted">AI-Powered Fitness Accountability Arena. Dedicated to Abuja Elite Professionals.</span>
              </div>
              <span className="text-xs text-textMuted">
                &copy; 2026 FitNaija. Designed for ultimate premium health impact.
              </span>
            </div>
          </footer>

          {/* GLOBAL TOAST NOTIFICATION CONTAINER */}
          {joinedToast && (
            <div className="fixed bottom-6 right-6 bg-textDark text-white text-xs font-bold px-5 py-3 rounded-lg shadow-xl border border-white/10 z-50 flex items-center gap-2 animate-bounce">
              <i data-lucide="sparkles" class="text-brand w-4 h-4"></i>
              <span>{joinedToast}</span>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
